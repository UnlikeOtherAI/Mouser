name: Mouser
options:
  bundleIdPrefix: ai.unlikeother.mouser
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_ALLOWED: "NO"

packages:
  # AppReveal — debug-only in-app MCP server. Advertises _appreveal._tcp over the
  # LAN so agents can inspect/control DEBUG builds. The framework's own code is
  # gated behind #if DEBUG (zero production footprint), and AppReveal.start() is
  # only invoked inside #if DEBUG in MouserApp.swift. See docs/tech-stack.md.
  AppReveal:
    url: https://github.com/UnlikeOtherAI/AppReveal.git
    from: "0.9.8"

targets:
  Mouser:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    dependencies:
      # The Rust engine bridge (mouser-ffi). Static lib in an XCFramework, so it is
      # linked, not embedded. Built by build-ffi.sh (gitignored, ~90 MB), which the
      # pre-build script below also runs so `xcodebuild` is self-sufficient.
      - framework: Frameworks/MouserFFI.xcframework
        embed: false
      # AppReveal debug-only in-app MCP server (see packages: above).
      - package: AppReveal
    preBuildScripts:
      - script: bash "${PROJECT_DIR}/build-ffi.sh"
        name: Build mouser-ffi XCFramework
        basedOnDependencyAnalysis: false
    entitlements:
      path: Sources/Mouser.entitlements
      properties:
        # Multicast entitlement — required alongside the Local Network usage
        # string for mDNS/Bonjour discovery on iOS. See docs/tech-stack.md §6.
        com.apple.developer.networking.multicast: true
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Mouser
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        # Local Network (mDNS/LAN) — required on iOS 14+ for the companion to
        # discover and dial engines over Bonjour. See docs/tech-stack.md §6.
        NSLocalNetworkUsageDescription: Mouser discovers and connects to your computers on the local network to control their mouse and keyboard.
        NSBonjourServices:
          - _mouser._udp
          # AppReveal advertises its debug MCP server over this Bonjour type so
          # agents can discover DEBUG builds on the LAN. See docs/tech-stack.md.
          - _appreveal._tcp
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Portrait = touchpad + native keyboard (brief: Bed Mode); landscape =
        # full-screen trackpad (requirement §1). Both orientations supported.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.unlikeother.mouser.companion
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
