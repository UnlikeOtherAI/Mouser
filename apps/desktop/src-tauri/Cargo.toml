[package]
name = "mouser-desktop"
version = "0.0.0"
description = "Mouser desktop UI shell (Tauri v2). UI client only â€” does not own the daemon (see docs/tech-stack.md Â§5)."
edition.workspace = true
license.workspace = true
repository.workspace = true

# This crate is unsafe-free on every platform EXCEPT the debug macOS build, where
# it links the AppReveal Swift shim and must call its `extern "C"` entry point â€”
# an `unsafe` FFI call (see src/appreveal.rs). The workspace `[lints]` `forbid`s
# `unsafe_code`, and `forbid` can't be locally relaxed, so this crate cannot adopt
# `[lints] workspace = true`. It instead replicates the workspace denies inline
# (`#![deny(unsafe_code)]` + the panic-free clippy denies in src/lib.rs) and only
# permits `unsafe` inside the debug-only `appreveal` module via a local
# `#[allow(unsafe_code)]`. This is the same pattern platform-mac/-win/-linux use
# for their C/Objective-C `unsafe`.
[lints.clippy]
unwrap_used = "deny"
panic = "deny"
indexing_slicing = "deny"

# The library is what mobile/other shells could embed; the binary is the app.
[lib]
name = "mouser_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-opener = "2"
# Cross-platform "launch at login": macOS LaunchAgent, Windows registry Run key,
# Linux XDG autostart .desktop â€” handled entirely by the plugin (docs/tech-stack.md Â§5).
tauri-plugin-autostart = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
whoami = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "net", "io-util", "sync", "macros", "time"] }
mouser-ipc = { path = "../../../crates/mouser-ipc" }
# The app now runs the engine IN-PROCESS (no separate `mouserd`): it builds the
# per-OS adapters and calls `mouser_engine::daemon::run_engine`. `mouser-core`
# supplies the platform traits (`InputInjection`/`InputCapture`/`Clipboard`).
mouser-engine = { path = "../../../crates/mouser-engine" }
mouser-core = { path = "../../../crates/mouser-core" }

# The in-process engine plugs the real per-OS adapters into the runtime, mirroring
# crates/mouser-engine/Cargo.toml and crates/mouser-engine/src/bin/mouserd.rs.
[target.'cfg(target_os = "macos")'.dependencies]
platform-mac = { path = "../../../crates/platform-mac" }

[target.'cfg(target_os = "windows")'.dependencies]
platform-win = { path = "../../../crates/platform-win" }
# Debug-only AppReveal in-app MCP server â€” Windows parity with the macOS Swift shim,
# but a pure-Rust crate (no FFI). It is started only under `cfg(debug_assertions)` in
# src/appreveal.rs, so a release build never runs it (the server also requires an
# explicit start + a per-session token). Not published to crates.io â†’ pinned git
# dependency; the `tauri` feature derives window/device metadata from the AppHandle.
appreveal-tauri = { git = "https://github.com/UnlikeOtherAI/AppReveal", tag = "v0.10.0", features = ["tauri"] }

[target.'cfg(target_os = "linux")'.dependencies]
platform-linux = { path = "../../../crates/platform-linux" }
